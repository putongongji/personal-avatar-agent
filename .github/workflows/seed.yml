name: Seed repository

on:
  push:
    paths:
      - .github/workflows/seed.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Download archive
        run: |
          curl -fL "https://optical-acc-static-exhibitions.trycloudflare.com/personal-avatar-agent.tar.gz" -o /tmp/personal-avatar-agent.tar.gz
      - name: Replace repository contents
        run: |
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          tar -xzf /tmp/personal-avatar-agent.tar.gz -C .
          rm -rf .github/workflows/seed.yml
      - name: Commit seeded project
        run: |
          git config user.name "putongongji"
          git config user.email "76991426+putongongji@users.noreply.github.com"
          git add -A
          git commit -m "Add personal avatar agent project"
          git push origin main
